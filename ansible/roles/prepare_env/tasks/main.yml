# ============================================================
# tasks/main.yml
# Projet      : Internal Developer Platform (IDP)
# Auteur      : Doaa Ben Marzouk
# Description : Tâches du rôle prepare_env
#               OS : Rocky Linux
# ============================================================

# ---- 1. Mettre à jour les paquets -------------------------
- name: Mettre à jour tous les paquets
  dnf:
    name: "*"
    state: latest

# ---- 2. Installer Docker ----------------------------------
- name: Installer yum-utils
  dnf:
    name: yum-utils
    state: present            # idempotent ✅

- name: Ajouter le repo Docker
  shell: yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo    # idempotent ✅

- name: Installer Docker Engine
  dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present            # idempotent ✅
  notify: restart docker

- name: Démarrer et activer Docker
  systemd:
    name: docker
    state: started
    enabled: true             # idempotent ✅

- name: Ajouter user au groupe docker
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true              # idempotent ✅

# ---- 3. Vérifier si K3s est déjà installé ----------------
- name: Vérifier si K3s est installé
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

# ---- 4. Installer K3s -------------------------------------
- name: Installer K3s
  shell: curl -sfL https://get.k3s.io | sh -
  when: not k3s_binary.stat.exists    # idempotent ✅
  notify: restart k3s

# ---- 5. Démarrer K3s --------------------------------------
- name: Démarrer et activer K3s
  systemd:
    name: k3s
    state: started
    enabled: true             # idempotent ✅

# ---- 6. Attendre que K3s soit prêt ------------------------
- name: Attendre que K3s soit prêt
  command: k3s kubectl get nodes
  register: k3s_status
  retries: 5
  delay: 10
  until: k3s_status.rc == 0
  changed_when: false         # idempotent ✅

# ---- 7. Récupérer le kubeconfig ---------------------------
- name: Récupérer le kubeconfig K3s
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ~/.kube/config
    flat: true

# ---- 8. Copier le code source sur la VM ------------------
- name: Copier le code source sur la VM
  copy:
    src: "{{ docker_context_path }}"
    dest: /tmp/{{ service_name }}

# ---- 9. Builder l'image Docker ----------------------------
- name: Builder l'image Docker
  community.docker.docker_image:
    name: "{{ docker_image }}"
    build:
      path: /tmp/{{ service_name }}
    source: build
    force_source: false       # idempotent ✅

# ---- 10. Confirmer que tout est prêt ----------------------
- name: Confirmer image buildée
  debug:
    msg: "✅ Image {{ docker_image }} prête dans K3s"

- name: Vérifier contexte kubectl
  command: kubectl config current-context
  register: kube_context
  changed_when: false         # idempotent ✅

- name: Tout est prêt pour Terraform
  debug:
    msg: "✅ K3s prêt — lance terraform apply"