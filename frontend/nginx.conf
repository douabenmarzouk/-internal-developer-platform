server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers Spring Boot sur Windows
    location /api/ {
        proxy_pass http://host.docker.internal:8085/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}