# ---- Application ------------------------------------------
spring.application.name=idp-backend
server.port=8085

# ---- MySQL -------------------------------
# -----------------
spring.datasource.url=jdbc:postgresql://localhost:5433/idp_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver


# ---- JPA --------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ---- Actuator (Prometheus) --------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.exposure.exclude=env,beans
management.health.db.ignore-routing-data-sources=true
management.endpoint.health.show-details=always
# ---- Ansible ----------------------------------------------
ansible.playbook.path=/mnt/c/Users/Doua/Downloads/internal-developer-platform/ansible/playbook.yml

# ---- Terraform --------------------------------------------
terraform.path=/mnt/c/Users/Doua/Downloads/internal-developer-platform/terraform