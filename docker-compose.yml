version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: idp-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - idp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: idp-frontend
    ports:
      - "3000:80"
    networks:
      - idp-network
    extra_hosts:
      - "host.docker.internal:host-gateway" # ✅ accès Windows

volumes:
  postgres_data:

networks:
  idp-network:
    driver: bridge